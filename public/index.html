<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torrent — Local Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="Local torrent downloader — WebTorrent runs on your machine." />
</head>
<body>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <div>
            <h1 class="brand-name">Torrent</h1>
            <p class="brand-sub">Local &amp; Private</p>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="downloads">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </span>
          <span>Downloads</span>
          <span class="nav-badge" id="count-badge" style="display:none">0</span>
        </button>
        <button class="nav-item" data-view="add">
          <span class="nav-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </span>
          <span>Add Torrent</span>
        </button>

        <!-- Theme toggle at bottom of nav -->
        <div class="sidebar-nav-footer">
          <button class="nav-item theme-toggle" id="theme-toggle" title="Toggle theme">
            <span class="nav-icon">
              <!-- Sun: shown in dark mode -->
              <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
              <!-- Moon: shown in light mode, hidden initially -->
              <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </span>
            <span id="theme-label">Light mode</span>
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <!-- Live total speeds -->
        <div class="sidebar-speeds" id="sidebar-speeds">
          <div class="sidebar-speed-row dl">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span id="total-dl-speed">—</span>
          </div>
          <div class="sidebar-speed-row ul">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 14 12 9 7 14"/><line x1="12" y1="21" x2="12" y2="9"/>
            </svg>
            <span id="total-ul-speed">—</span>
          </div>
        </div>
        <div class="engine-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>
          <span>WebTorrent · Local</span>
        </div>
        <p class="saves-to">Saves to <code>./downloads</code></p>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">

      <!-- Downloads view -->
      <section class="view active" id="view-downloads">
        <div class="view-header">
          <h2 class="view-title">Downloads</h2>
          <button class="btn-icon fab" id="fab-add" title="Add Torrent">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div id="torrent-list" class="torrent-list"></div>
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <p class="empty-title">No active downloads</p>
          <p class="empty-sub">Add a magnet link or .torrent file to get started</p>
          <button class="btn btn-primary" id="empty-add-btn">Add Torrent</button>
        </div>
      </section>

      <!-- Add torrent view -->
      <section class="view" id="view-add">
        <div class="view-header">
          <h2 class="view-title">Add Torrent</h2>
        </div>

        <div class="add-card">
          <div class="tabs">
            <button class="tab active" data-tab="magnet">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              Magnet link
            </button>
            <button class="tab" data-tab="file">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              .torrent file
            </button>
          </div>

          <div class="tab-panel active" id="panel-magnet">
            <form id="form-magnet" class="form">
              <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                <textarea id="magnet" name="magnet" placeholder="Paste magnet link here…" rows="3"></textarea>
              </div>
              <div id="preview-loader-magnet" class="preview-loader hidden">
                <span class="loader-ring"></span>
                <span>Fetching metadata…</span>
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="btn-add-magnet">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Add Torrent
              </button>
            </form>
          </div>

          <div class="tab-panel" id="panel-file">
            <form id="form-file" class="form">
              <label class="file-drop">
                <input type="file" name="torrent" accept=".torrent" />
                <div class="file-drop-inner">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="12" /><line x1="15" y1="15" x2="12" y2="12"/></svg>
                  <span class="file-text">Click to choose .torrent file</span>
                  <span class="file-sub">or drag and drop</span>
                </div>
              </label>
              <div id="preview-loader-file" class="preview-loader hidden">
                <span class="loader-ring"></span>
                <span>Fetching metadata…</span>
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="btn-add-file">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Add Torrent
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Preview modal -->
  <div id="preview-modal" class="modal" role="dialog" aria-labelledby="preview-modal-title">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-head">
        <h2 id="preview-modal-title" class="modal-title">Confirm Download</h2>
        <button type="button" class="close-btn preview-modal-close" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="preview-summary" class="meta-grid"></div>
        <p class="files-label">Files included</p>
        <div id="preview-files" class="files-list"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost preview-cancel">Cancel</button>
        <button type="button" class="btn btn-primary preview-add">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Start Download
        </button>
      </div>
    </div>
  </div>

  <!-- Details modal -->
  <div id="details-modal" class="modal" role="dialog" aria-labelledby="modal-title">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-head">
        <h2 id="modal-title" class="modal-title">Torrent Details</h2>
        <button type="button" class="close-btn modal-close" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="details-summary" class="meta-grid"></div>
        <p class="files-label">Files</p>
        <div id="details-files" class="files-list"></div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
  <script>
    // View navigation
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('view-' + id)?.classList.add('active');
      document.querySelector(`.nav-item[data-view="${id}"]`)?.classList.add('active');
    }
    document.querySelectorAll('.nav-item[data-view]').forEach(item => {
      item.addEventListener('click', () => showView(item.dataset.view));
    });
    document.getElementById('fab-add')?.addEventListener('click', () => showView('add'));
    document.getElementById('empty-add-btn')?.addEventListener('click', () => showView('add'));
  </script>
</body>
</html>
